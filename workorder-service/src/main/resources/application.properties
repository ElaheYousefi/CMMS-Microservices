spring.application.name=workorder
server.port=8083
spring.datasource.url=jdbc:postgresql://localhost:5432/workorder_db
spring.datasource.username=postgres
spring.datasource.password=postgres
logging.level.dadeAndisheNiroo=DEBUG
spring.flyway.baseline-on-migrate=false
spring.flyway.enabled=true
spring.flyway.clean-disabled=false
logging.level.org.flywaydb=DEBUG
logging.level.org.flywaydb.core=DEBUG
logging.level.org.springframework.core.env=DEBUG
spring.flyway.locations=classpath:db/migration
spring.kafka.bootstrap-servers=localhost:9092

spring.kafka.consumer.group-id=workorder-group
spring.kafka.consumer.auto-offset-reset=earliest

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.consumer.properties.spring.json.trusted.packages=*