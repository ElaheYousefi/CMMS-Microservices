spring.application.name=equipment-service
server.port=8081

# Database
spring.datasource.url=jdbc:postgresql://postgres:5432/equipment_db
spring.datasource.username=postgres
spring.datasource.password=postgres

# Flyway
spring.flyway.baseline-on-migrate=false
spring.flyway.enabled=true
spring.flyway.clean-disabled=false
spring.flyway.locations=classpath:db/migration

logging.level.org.flywaydb=TRACE
logging.level.org.flywaydb.core=DEBUG
logging.level.org.springframework.core.env=DEBUG


# ======================
# Kafka Configuration
# ======================

spring.kafka.bootstrap-servers=kafka:9092

# Consumer
spring.kafka.consumer.group-id=equipment-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.value.default.type=ir.dadeandish.event.MaintenanceCompletedEvent

logging.level.org.springframework.kafka=TRACE
logging.level.org.apache.kafka=DEBUG
logging.level.org.springframework.boot.autoconfigure.kafka=DEBUG

#actuator
management.endpoints.web.exposure.include=health,info
management.endpoints.web.base-path=/actuator
management.endpoint.health.show-details=always